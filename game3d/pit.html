<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Sorcerer-Sword 3D — The Pit</title>
<!-- 3D UPLIFT · Bucket 2: combat in the Pit. Fresh 3D feel, KayKit enemy stand-ins, 3/4 follow-cam.
     Runs from a plain file:// double-click (models embedded). Needs internet for the CDN libs. -->
<style>
  html,body{margin:0;height:100%;background:#0a0712;overflow:hidden;font-family:'Courier New',monospace;color:#d8cdb8;user-select:none}
  #c{display:block;width:100vw;height:100vh}
  #tint{position:fixed;inset:0;pointer-events:none;z-index:2;mix-blend-mode:soft-light;
    background:linear-gradient(180deg,rgba(80,40,120,.30),rgba(0,0,0,0) 42%,rgba(0,0,0,0) 62%,rgba(170,70,25,.30))}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse at 50% 46%,rgba(0,0,0,0) 36%,rgba(0,0,0,.62) 100%)}
  #hud{position:fixed;inset:0;pointer-events:none;z-index:6}
  #hp{position:fixed;left:18px;bottom:18px;width:300px;max-width:42vw}
  #hp .lbl{font-size:11px;letter-spacing:2px;color:#caa;margin-bottom:3px}
  #hp .bar{height:16px;background:#2a1014;border:1px solid #6a2a2a;border-radius:3px;overflow:hidden}
  #hp .fill{height:100%;width:100%;background:linear-gradient(#e7503a,#a01f1f);transition:width .15s}
  #fight{position:fixed;right:18px;top:14px;text-align:right;font-size:13px;letter-spacing:2px;color:#e7c98a}
  #fight .sub{font-size:11px;color:#9a8aa0}
  #abil{position:fixed;left:18px;bottom:64px;font-size:11px;letter-spacing:1px;color:#7fd}
  #abil b{color:#e7c98a}
  #abil .cd{color:#a06}
  #ctrls{position:fixed;right:18px;bottom:16px;font-size:10px;letter-spacing:1px;color:#6a5a7a;text-align:right;line-height:1.7}
  #ann{position:fixed;left:0;right:0;top:30%;text-align:center;z-index:7;pointer-events:none;opacity:0;transition:opacity .35s}
  #ann .big{font-family:Georgia,serif;font-size:clamp(30px,8vw,72px);color:#f0d49a;text-shadow:0 0 30px rgba(231,160,60,.6),0 3px 0 #3a1a06;letter-spacing:.06em}
  #ann .say{font-size:14px;color:#d8b0c0;letter-spacing:1px;margin-top:8px}
  #ann.show{opacity:1}
  #flash{position:fixed;inset:0;background:#e7503a;opacity:0;pointer-events:none;z-index:4;mix-blend-mode:screen}
  #over{position:fixed;inset:0;z-index:12;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(8,5,16,.82);backdrop-filter:blur(2px);text-align:center;padding:20px}
  #over h1{font-family:Georgia,serif;color:#e7c98a;font-size:clamp(26px,6vw,52px);margin:0 0 4px;text-shadow:0 0 28px rgba(231,160,60,.5)}
  #over p{color:#a294b0;max-width:520px;font-size:13px;line-height:1.7;letter-spacing:.5px}
  .picks{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:18px}
  .pick{width:150px;background:rgba(20,12,30,.8);border:1px solid #4a3a5a;border-radius:8px;padding:14px 10px;cursor:pointer;transition:.15s}
  .pick:hover{border-color:#e7b450;background:rgba(40,24,52,.9);transform:translateY(-3px)}
  .pick .nm{font-family:Georgia,serif;font-size:18px;color:#e7d4a0;letter-spacing:1px}
  .pick .bl{font-size:10px;color:#8a7a9a;margin-top:6px;line-height:1.5}
  .btn{margin:8px;padding:11px 22px;background:rgba(40,24,52,.9);border:1px solid #e7b450;color:#e7d4a0;cursor:pointer;
    font-family:'Courier New',monospace;letter-spacing:2px;font-size:13px;border-radius:5px}
  .btn:hover{background:rgba(231,180,80,.22)}
  .btn.alt{border-color:#5a6a8a;color:#aab8d0}
  #load{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0712;z-index:14;transition:opacity .5s}
  #load h1{font-family:Georgia,serif;color:#d8c9a3;font-size:clamp(22px,5vw,40px);margin:0;text-shadow:0 0 24px rgba(200,146,58,.4)}
  #load .sub{color:#8a2f2f;letter-spacing:.4em;font-size:12px;margin-top:8px}
  #err{display:none;position:fixed;left:12px;right:12px;top:12px;z-index:30;background:rgba(30,6,10,.95);border:1px solid #c8443a;color:#f0c8c0;font:12px/1.5 'Courier New',monospace;padding:12px;white-space:pre-wrap;max-height:60vh;overflow:auto}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="tint"></div><div id="vig"></div>
<div id="flash"></div>
<div id="hud">
  <div id="hp"><div class="lbl">— </div><div class="bar"><div class="fill"></div></div></div>
  <div id="fight"></div>
  <div id="abil"></div>
  <div id="ctrls">WASD / arrows &mdash; move<br>J or Left-click &mdash; attack<br>K or Space &mdash; dodge<br>L or Right-click &mdash; special<br>drag &mdash; rotate camera</div>
</div>
<div id="ann"><div class="big"></div><div class="say"></div></div>
<div id="err"></div>
<div id="over"></div>
<div id="load"><h1>THE PIT</h1><div class="sub">3D &mdash; descend</div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="assets/embedded3d.js"></script>
<script src="champions.js"></script>
<script>
(function(){
"use strict";
const errEl=document.getElementById('err'),loadEl=document.getElementById('load');
function showErr(m){errEl.style.display='block';errEl.textContent='⚠ '+m;loadEl.style.display='none';}
window.addEventListener('error',ev=>showErr((ev.message||'error')+'  ['+(((ev.filename||'')+'').split('/').pop())+':'+(ev.lineno||'?')+']'));
window.addEventListener('unhandledrejection',ev=>showErr('promise: '+((ev.reason&&(ev.reason.message||ev.reason))||'?')));
const THREE=window.THREE;
if(!THREE){showErr('needs internet to load Three.js');return;}
if(!window.CHAMP){showErr('champions.js failed to load');return;}
if(!THREE.GLTFLoader){showErr('GLTFLoader failed to load from CDN');return;}
const EMB=window.EMB3D,W=()=>innerWidth,H=()=>innerHeight;

const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(2,devicePixelRatio));renderer.setSize(W(),H());
renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputEncoding=THREE.sRGBEncoding;renderer.toneMapping=THREE.ACESFilmicToneMapping;renderer.toneMappingExposure=1.18;
const scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x140a1e,0.022);
const camera=new THREE.PerspectiveCamera(50,W()/H(),0.1,300);
const M=CHAMP.M,addGlow=CHAMP.addGlow;
const cyl=(rt,rb,h,m,s)=>new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,s||8),m);

// ---- arena / atmosphere ----
(function(){const cv=document.createElement('canvas');cv.width=4;cv.height=256;const x=cv.getContext('2d');
  const g=x.createLinearGradient(0,0,0,256);g.addColorStop(0,'#1a1030');g.addColorStop(.45,'#2a1538');g.addColorStop(.75,'#5a2030');g.addColorStop(1,'#b8581f');
  x.fillStyle=g;x.fillRect(0,0,4,256);const t=new THREE.CanvasTexture(cv);
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(140,24,16),new THREE.MeshBasicMaterial({map:t,side:THREE.BackSide,fog:false})));})();
scene.add(new THREE.HemisphereLight(0x6a6a9a,0x201018,0.6));
const key=new THREE.DirectionalLight(0xffe2b0,1.2);key.position.set(7,14,6);key.castShadow=true;
key.shadow.mapSize.set(2048,2048);key.shadow.camera.left=-16;key.shadow.camera.right=16;key.shadow.camera.top=16;key.shadow.camera.bottom=-16;key.shadow.bias=-0.0004;scene.add(key);
const rim=new THREE.DirectionalLight(0x6aa0ff,0.6);rim.position.set(-8,6,-7);scene.add(rim);
const ARENA_R=11;
const floor=new THREE.Mesh(new THREE.CylinderGeometry(ARENA_R+1.5,ARENA_R+1.5,0.6,56),M(0x17121f,{roughness:1}));floor.position.y=-0.3;floor.receiveShadow=true;scene.add(floor);
const rune=new THREE.Mesh(new THREE.TorusGeometry(ARENA_R-0.4,0.16,8,64),M(0x2ad0c0,{emissive:0x1aa090,emissiveIntensity:1.3}));rune.rotation.x=Math.PI/2;rune.position.y=0.06;scene.add(rune);
for(let i=0;i<24;i++){const a=i/24*Math.PI*2;addGlow(scene,0x2ad0c0,2.0,.45).position.set(Math.cos(a)*(ARENA_R-0.4),0.3,Math.sin(a)*(ARENA_R-0.4));}
const wall=new THREE.Mesh(new THREE.CylinderGeometry(ARENA_R+1.5,ARENA_R+1.5,3,56,1,true),M(0x241a30,{side:THREE.DoubleSide}));wall.position.y=1.2;scene.add(wall);
const specCols=[0x6a2030,0x304a78,0x2c5a4a,0x6a5020,0x4a2c5a];
for(let t=0;t<2;t++){const rad=ARENA_R+2.6+t*1.7,y=1.2+t*1.2;
  const n=40+t*8;for(let i=0;i<n;i++){const a=i/n*Math.PI*2;const b=cyl(0.16,0.22,0.7,M(specCols[(i+t)%5]),6);b.position.set(Math.cos(a)*rad,y+0.7,Math.sin(a)*rad);const hd=new THREE.Mesh(new THREE.SphereGeometry(0.13,6,5),M(0xb88a64));hd.position.y=0.48;b.add(hd);scene.add(b);}}
const pillars=[];
function pillar(x,z,col){const g=new THREE.Group();const p=cyl(0.24,0.34,4.6,M(0x241b14),7);p.position.y=2.3;p.castShadow=true;g.add(p);
  const fl=new THREE.Mesh(new THREE.ConeGeometry(0.5,1.3,7),new THREE.MeshStandardMaterial({color:col,emissive:col,emissiveIntensity:1.6,flatShading:true}));fl.position.y=5.0;g.add(fl);g.userData.flame=fl;
  addGlow(fl,col,4.5,.9);
  const l=new THREE.PointLight(col,1.1,24,2);l.position.set(0,5.1,0);g.add(l);g.userData.light=l;g.position.set(x,0,z);scene.add(g);pillars.push(g);}
const PR=ARENA_R+0.4;pillar(-PR*0.7,-PR*0.7,0xff8a3a);pillar(PR*0.7,-PR*0.7,0xff8a3a);pillar(-PR*0.7,PR*0.7,0xffae5a);pillar(PR*0.7,PR*0.7,0xffae5a);
const embers=[];const eGeo=new THREE.SphereGeometry(0.05,4,4),eMat=new THREE.MeshBasicMaterial({color:0xffb060});
for(let i=0;i<50;i++){const e=new THREE.Mesh(eGeo,eMat);e.position.set((Math.random()-.5)*26,Math.random()*9,(Math.random()-.5)*26);e.userData.vy=.3+Math.random()*.6;scene.add(e);embers.push(e);}

// ======================= combat state =======================
const clock=new THREE.Clock();let T=0;
let CLIPS=[],player=null,enemies=[],effects=[],bars=[];
let state='select',fightNum=0,silver=0,pendingSpawn=0,waveBankrupt=false;
const keys={};
const loader=new THREE.GLTFLoader();
const tmp=new THREE.Vector3(),tmp2=new THREE.Vector3();

// camera orbit (3/4 follow)
let camYaw=Math.PI,camPitch=0.62,camDist=10;let drag=false,px=0,py=0;
addEventListener('pointerdown',e=>{if(e.button===2)return;drag=true;px=e.clientX;py=e.clientY;});
addEventListener('pointerup',()=>drag=false);
addEventListener('pointermove',e=>{if(!drag)return;camYaw-=(e.clientX-px)*0.006;camPitch=Math.max(0.25,Math.min(1.2,camPitch-(e.clientY-py)*0.005));px=e.clientX;py=e.clientY;});
addEventListener('wheel',e=>{camDist=Math.max(5,Math.min(18,camDist+e.deltaY*0.01));},{passive:true});
addEventListener('contextmenu',e=>e.preventDefault());
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if([' ','arrowup','arrowdown','arrowleft','arrowright'].includes(e.key.toLowerCase()))e.preventDefault();});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false;});
addEventListener('mousedown',e=>{if(state!=='fight'||!player||!player.alive)return;if(e.button===0)attack();if(e.button===2)special();});
addEventListener('resize',()=>{renderer.setSize(W(),H());camera.aspect=W()/H();camera.updateProjectionMatrix();});

// ---- animation helper ----
function actionOf(ent,name){let a=ent.acts[name];if(a!==undefined)return a;const clip=CLIPS.find(c=>c.name===name)||null;a=clip?ent.mixer.clipAction(clip):null;ent.acts[name]=a;return a;}
function setAnim(ent,name,opt){opt=opt||{};const a=actionOf(ent,name);if(!a){return;}if(ent.cur===a&&!opt.force)return;
  a.reset();a.setLoop(opt.once?THREE.LoopOnce:THREE.LoopRepeat,Infinity);a.clampWhenFinished=!!opt.once;a.timeScale=opt.speed||1;
  a.fadeIn(opt.fade==null?0.18:opt.fade).play();if(ent.cur&&ent.cur!==a)ent.cur.fadeOut(opt.fade==null?0.18:opt.fade);ent.cur=a;ent.curName=name;}
function clipName(want,fallback){return CLIPS.find(c=>c.name===want)?want:fallback;}
const ATK_CLIP='Throw',HIT_CLIP='Hit_A',DEATH_CLIP='Death_A',RUN_CLIP='Running_A',IDLE_CLIP='Idle_A';

// ---- entity health bar (billboard above head) ----
function makeBar(color){const g=new THREE.Group();
  const bg=new THREE.Sprite(new THREE.SpriteMaterial({color:0x200a0a,depthTest:false,fog:false}));bg.scale.set(1.0,0.12,1);g.add(bg);
  const fg=new THREE.Sprite(new THREE.SpriteMaterial({color:color,depthTest:false,fog:false}));fg.scale.set(1.0,0.12,1);g.add(fg);
  g.userData={bg,fg};g.renderOrder=999;scene.add(g);bars.push(g);return g;}

// ======================= spawning =======================
function makePlayer(key,cb){
  CHAMP.makeChampion(loader,EMB,key,(model,api)=>{
    CHAMP.groundModel(model,2.0);model.position.set(0,0,4);model.rotation.y=Math.PI;
    scene.add(model);
    const mixer=new THREE.AnimationMixer(model);
    player={kind:'player',key,model,mixer,acts:{},cur:null,curName:'',hp:100,maxhp:100,alive:true,
      speed:5.2,atkCd:0,dodgeCd:0,specCd:0,iframe:0,busy:0,facing:Math.PI};
    setAnim(player,clipName(IDLE_CLIP,CLIPS[0]&&CLIPS[0].name));
    cb&&cb();
  },e=>showErr('player rig: '+e));
}
function spawnEnemy(x,z,hp,speed,dmg){
  pendingSpawn++;
  CHAMP.makeKnight(loader,EMB,(model)=>{
    CHAMP.groundModel(model,1.95);model.position.set(x,0,z);
    // tint the bought Knight red so it reads as a foe (placeholder enemy art)
    model.traverse(o=>{if(o.isMesh&&o.material){o.material=o.material.clone();if(o.material.color)o.material.color.lerp(new THREE.Color(0x8a2522),0.55);o.material.emissive=new THREE.Color(0x300808);o.material.emissiveIntensity=0.5;}});
    scene.add(model);
    const mixer=new THREE.AnimationMixer(model);
    const en={kind:'enemy',model,mixer,acts:{},cur:null,curName:'',hp:hp,maxhp:hp,alive:true,speed:speed,dmg:dmg,
      atkCd:Math.random()*1.0,hitT:0,deadT:0,bar:makeBar(0xe7503a)};
    setAnim(en,clipName(IDLE_CLIP,CLIPS[0]&&CLIPS[0].name));
    enemies.push(en);pendingSpawn--;
  },e=>{pendingSpawn--;showErr('enemy rig: '+e);});
}
function spawnFight(n){
  fightNum=n;
  const count=Math.min(2+n,7);
  const hp=30+n*14+(n>3?40:0);
  const speed=2.2+n*0.25;
  const dmg=6+n*1.4;
  for(let i=0;i<count;i++){const a=(i/count)*Math.PI*2+Math.random()*0.3;const r=ARENA_R-2.2;spawnEnemy(Math.cos(a)*r,Math.sin(a)*r,hp,speed,dmg);}
  announce('FIGHT '+n,bellowLine(n));
  state='fight';updateHUD();
}
function bellowLine(n){const L={1:'"Fresh meat! Show the crowd you can bleed them."',2:'"Again! The Pit is just warming up."',3:'"Three deep. The mob loves you now."',4:'"One last test. Make it bloody."'};return L[n]||'"Fight!"';}

// ======================= player actions =======================
function attack(){if(player.atkCd>0||player.busy>0)return;player.atkCd=0.55;player.busy=0.35;
  setAnim(player,clipName(ATK_CLIP,'Interact'),{once:true,fade:0.06,speed:1.4,force:true});
  slashFx(player,0x9fdcff);
  const reach=2.1,arc=Math.cos(1.1);const f=facingVec(player);
  enemies.forEach(en=>{if(!en.alive)return;tmp.subVectors(en.model.position,player.model.position);tmp.y=0;const d=tmp.length();
    if(d<reach){tmp.normalize();if(tmp.dot(f)>arc){hurtEnemy(en,20,f,3.0);}}});}
function dodge(){if(player.dodgeCd>0)return;player.dodgeCd=0.9;player.iframe=0.42;player.busy=0.3;
  const f=facingVec(player);player.dashV=f.clone().multiplyScalar(9.0);player.dashT=0.22;
  setAnim(player,clipName('Jump_Idle','Running_A'),{once:true,fade:0.05,speed:1.3,force:true});}
function special(){if(player.specCd>0||player.busy>0)return;player.specCd=5.0;player.busy=0.5;
  const f=facingVec(player);const k=player.key;
  if(k==='ronin'){player.dashV=f.clone().multiplyScalar(12);player.dashT=0.3;player.iframe=0.35;
    setAnim(player,clipName(ATK_CLIP,'Interact'),{once:true,speed:1.6,force:true});
    setTimeout(()=>{lineHit(36,0x9fdcff,3.6);},120);}
  else if(k==='druid'){burstFx(0x8ef25a,3.4);radialHit(34,3.4,5.5);
    setAnim(player,clipName('Use_Item',ATK_CLIP),{once:true,speed:1.2,force:true});}
  else if(k==='warlock'){castProjectile(0xb070ff,f,40);
    setAnim(player,clipName(ATK_CLIP,'Interact'),{once:true,speed:1.2,force:true});}
  else{beamFx(0x8fe6ff,f);lineHit(42,0x8fe6ff,5.0);
    setAnim(player,clipName('Use_Item',ATK_CLIP),{once:true,speed:1.1,force:true});}
  updateHUD();}
function facingVec(ent){return new THREE.Vector3(Math.sin(ent.facing),0,Math.cos(ent.facing));}
function radialHit(dmg,radius,knock){const c=player.model.position;enemies.forEach(en=>{if(!en.alive)return;tmp.subVectors(en.model.position,c);tmp.y=0;if(tmp.length()<radius){const dir=tmp.clone().normalize();hurtEnemy(en,dmg,dir,knock);}});}
function lineHit(dmg,color,range){const f=facingVec(player);const c=player.model.position;enemies.forEach(en=>{if(!en.alive)return;tmp.subVectors(en.model.position,c);tmp.y=0;const along=tmp.dot(f);if(along>0&&along<range){const perp=tmp.clone().addScaledVector(f,-along).length();if(perp<1.4)hurtEnemy(en,dmg,f,3.5);}});}

// ======================= damage / death =======================
function hurtEnemy(en,dmg,dir,knock){if(!en.alive)return;en.hp-=dmg;en.hitT=0.14;
  if(dir&&knock){en.model.position.addScaledVector(dir,knock*0.12);}
  if(en.hp<=0){en.alive=false;en.deadT=1.6;setAnim(en,clipName(DEATH_CLIP,'Hit_A'),{once:true,fade:0.1,force:true});}
  else setAnim(en,clipName(HIT_CLIP,'Idle_A'),{once:true,fade:0.05,speed:1.4,force:true});}
function hurtPlayer(dmg){if(!player.alive||player.iframe>0)return;player.hp-=dmg;flash();
  if(player.hp<=0){player.hp=0;player.alive=false;setAnim(player,clipName(DEATH_CLIP,'Hit_A'),{once:true,fade:0.1,force:true});defeat();}
  updateHUD();}

// ======================= effects =======================
function addEffect(mesh,dur,fn){mesh.userData._t=0;mesh.userData._dur=dur;mesh.userData._fn=fn;scene.add(mesh);effects.push(mesh);}
function slashFx(ent,color){const m=new THREE.Mesh(new THREE.RingGeometry(0.9,2.1,18,1,-0.9,1.8),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.85,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false,fog:false}));
  m.rotation.x=-Math.PI/2;m.position.copy(ent.model.position);m.position.y=1.0;m.rotation.z=-ent.facing;
  addEffect(m,0.22,(e,p)=>{e.material.opacity=0.85*(1-p);e.scale.setScalar(1+p*0.4);});}
function burstFx(color,r){const m=new THREE.Mesh(new THREE.RingGeometry(0.2,0.5,28),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.9,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false,fog:false}));
  m.rotation.x=-Math.PI/2;m.position.copy(player.model.position);m.position.y=0.2;
  addEffect(m,0.45,(e,p)=>{e.material.opacity=0.9*(1-p);e.scale.setScalar(1+p*(r/0.4));});}
function beamFx(color,f){const m=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.5,5.0),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.8,blending:THREE.AdditiveBlending,depthWrite:false,fog:false}));
  m.position.copy(player.model.position).addScaledVector(f,2.6);m.position.y=1.2;m.rotation.y=player.facing;
  addEffect(m,0.4,(e,p)=>{e.material.opacity=0.8*(1-p);e.scale.x=e.scale.y=1+p;});}
function castProjectile(color,f,dmg){const m=new THREE.Mesh(new THREE.SphereGeometry(0.26,12,10),new THREE.MeshBasicMaterial({color,transparent:true,opacity:0.95,blending:THREE.AdditiveBlending,depthWrite:false,fog:false}));
  addGlow(m,color,1.6,0.9);m.position.copy(player.model.position).addScaledVector(f,0.8);m.position.y=1.2;
  m.userData.vel=f.clone().multiplyScalar(15);m.userData.dmg=dmg;m.userData.proj=true;
  addEffect(m,1.4,(e,p,dt)=>{e.position.addScaledVector(e.userData.vel,dt);
    for(const en of enemies){if(!en.alive)continue;tmp.subVectors(en.model.position,e.position);tmp.y=0;if(tmp.length()<1.1){hurtEnemy(en,e.userData.dmg,e.userData.vel.clone().normalize(),4);e.userData._dur=0;break;}}});}
function flash(){const f=document.getElementById('flash');f.style.opacity=0.5;setTimeout(()=>f.style.opacity=0,90);}

// ======================= announcer / HUD =======================
let annT=0;
function announce(big,say){const a=document.getElementById('ann');a.querySelector('.big').textContent=big;a.querySelector('.say').textContent=say||'';a.classList.add('show');annT=2.2;}
function updateHUD(){
  document.querySelector('#hp .lbl').textContent=(player?player.key.toUpperCase():'—')+'   '+(player?Math.ceil(player.hp):0)+' / '+(player?player.maxhp:0);
  document.querySelector('#hp .fill').style.width=(player?Math.max(0,player.hp/player.maxhp*100):0)+'%';
  const left=enemies.filter(e=>e.alive).length+pendingSpawn;
  document.getElementById('fight').innerHTML=(fightNum?('FIGHT '+fightNum):'')+'<div class="sub">'+(state==='fight'?(left+' foe'+(left===1?'':'s')+' left'):'')+'</div><div class="sub">silver: '+silver+'</div>';
  const ab={ronin:'Dash Strike',druid:'Wild Roar',warlock:'Void Bolt',seraphim:'Halo Ray'}[player?player.key:'']||'Special';
  document.getElementById('abil').innerHTML='<b>L / Right-click:</b> '+ab+' '+(player&&player.specCd>0?'<span class="cd">('+player.specCd.toFixed(1)+'s)</span>':'<span style="color:#7fd">ready</span>');
}

// ======================= flow =======================
function showSelect(){state='select';const o=document.getElementById('over');o.style.display='flex';
  o.innerHTML='<h1>THE PIT</h1><p>Choose your champion. Survive the crowd. After three fights, Bellow will offer you the door &mdash; or you can go one deeper.</p><div class="picks"></div>';
  const row=o.querySelector('.picks');
  CHAMP.CHAMPS.forEach(ch=>{const d=document.createElement('div');d.className='pick';d.innerHTML='<div class="nm">'+ch.name+'</div><div class="bl">'+ch.blurb+'</div>';d.onclick=()=>begin(ch.key);row.appendChild(d);});}
function begin(key){document.getElementById('over').style.display='none';
  makePlayer(key,()=>{updateHUD();announce('ENTER THE PIT','"'+key.toUpperCase()+'! Into the sand!"');setTimeout(()=>spawnFight(1),1600);});}
function nextAfterClear(){
  if(fightNum===3){leaveOffer();return;}
  if(fightNum>=4){victory();return;}
  announce('FIGHT '+fightNum+' CLEARED','"They want more!"');state='intermission';
  setTimeout(()=>spawnFight(fightNum+1),1900);}
function leaveOffer(){state='offer';const o=document.getElementById('over');o.style.display='flex';
  o.innerHTML='<h1>BELLOW\'S OFFER</h1><p>"Three fights, still standing. The house will pay you <b>15 silver</b> to walk now &mdash; or stay, and face the worst of the Pit for the real purse."</p>';
  const b1=document.createElement('div');b1.className='btn';b1.textContent='ONE MORE FIGHT';b1.onclick=()=>{o.style.display='none';spawnFight(4);};
  const b2=document.createElement('div');b2.className='btn alt';b2.textContent='TAKE 15 SILVER & LEAVE';b2.onclick=()=>{silver+=15;o.style.display='none';leftPit();};
  o.appendChild(b1);o.appendChild(b2);}
function endScreen(title,body){state='end';const o=document.getElementById('over');o.style.display='flex';
  o.innerHTML='<h1>'+title+'</h1><p>'+body+'</p>';
  const again=document.createElement('div');again.className='btn';again.textContent='FIGHT AGAIN';again.onclick=()=>location.reload();o.appendChild(again);
  const back=document.createElement('div');back.className='btn alt';back.textContent='← CHAMPIONS';back.onclick=()=>location.href='index.html';o.appendChild(back);}
function victory(){endScreen('PIT CHAMPION','You cleared all four fights of the Pit. The crowd roars your name. (In the full game this is where the Pit arc hands off to the city and the story proper.)');}
function leftPit(){endScreen('YOU WALKED','You took Bellow\'s 15 silver and left the Pit on your feet &mdash; a wise fighter knows when the odds turn. The road to the city awaits.');}
function defeat(){setTimeout(()=>endScreen('DOWNED','The sand takes another. The crowd is already chanting for the next challenger.'),900);}

// ======================= main loop =======================
function update(dt){
  T+=dt;
  for(const e of embers){e.position.y+=e.userData.vy*dt;if(e.position.y>9){e.position.y=0;e.position.x=(Math.random()-.5)*26;e.position.z=(Math.random()-.5)*26;}}
  for(const pl of pillars){pl.userData.light.intensity=.85+Math.random()*.45;pl.userData.flame.scale.y=.85+Math.random()*.4;}
  if(annT>0){annT-=dt;if(annT<=0)document.getElementById('ann').classList.remove('show');}

  // effects
  for(let i=effects.length-1;i>=0;i--){const m=effects[i];m.userData._t+=dt;const p=m.userData._t/m.userData._dur;
    if(m.userData._fn)m.userData._fn(m,Math.min(1,p),dt);if(p>=1){scene.remove(m);effects.splice(i,1);}}

  if(player){
    player.mixer.update(dt);
    player.atkCd=Math.max(0,player.atkCd-dt);player.dodgeCd=Math.max(0,player.dodgeCd-dt);
    player.specCd=Math.max(0,player.specCd-dt);player.iframe=Math.max(0,player.iframe-dt);player.busy=Math.max(0,player.busy-dt);
    if(player.alive&&state==='fight'){
      // dash momentum
      if(player.dashT>0){player.dashT-=dt;player.model.position.addScaledVector(player.dashV,dt);}
      // movement (camera-relative)
      let mx=0,mz=0;if(keys['w']||keys['arrowup'])mz+=1;if(keys['s']||keys['arrowdown'])mz-=1;
      if(keys['a']||keys['arrowleft'])mx-=1;if(keys['d']||keys['arrowright'])mx+=1;
      // camera forward on XZ
      tmp.set(camera.position.x-player.model.position.x,0,camera.position.z-player.model.position.z).normalize();
      const fwd=tmp.clone().multiplyScalar(-1),right=new THREE.Vector3(fwd.z,0,-fwd.x);
      const move=new THREE.Vector3().addScaledVector(fwd,mz).addScaledVector(right,mx);
      const moving=move.lengthSq()>0.001;
      if(moving&&player.busy<=0&&player.dashT<=0){move.normalize();player.model.position.addScaledVector(move,player.speed*dt);player.facing=Math.atan2(move.x,move.z);}
      player.model.rotation.y=player.facing;
      // clamp to arena
      const pr=Math.hypot(player.model.position.x,player.model.position.z);if(pr>ARENA_R-0.6){player.model.position.x*=(ARENA_R-0.6)/pr;player.model.position.z*=(ARENA_R-0.6)/pr;}
      // keyboard actions
      if(keys['j'])attack();if(keys['k']||keys[' '])dodge();if(keys['l'])special();
      // locomotion anim
      if(player.busy<=0&&player.dashT<=0)setAnim(player,moving?clipName(RUN_CLIP,'Walking_A'):clipName(IDLE_CLIP,CLIPS[0].name),{speed:moving?1.1:1});
    }
  }

  // enemies
  let aliveCount=0;
  for(const en of enemies){en.mixer.update(dt);if(en.hitT>0)en.hitT-=dt;
    if(!en.alive){en.deadT-=dt;if(en.deadT<0.6){en.model.visible=en.deadT>0?true:false;}
      if(en.bar){en.bar.visible=false;} continue;}
    aliveCount++;
    if(state!=='fight'||!player||!player.alive){setAnim(en,clipName(IDLE_CLIP,CLIPS[0].name));continue;}
    en.atkCd=Math.max(0,en.atkCd-dt);
    tmp.subVectors(player.model.position,en.model.position);tmp.y=0;const d=tmp.length();
    const face=Math.atan2(tmp.x,tmp.z);en.model.rotation.y=face;
    if(d>1.5){tmp.normalize();en.model.position.addScaledVector(tmp,en.speed*dt);if(en.hitT<=0)setAnim(en,clipName(RUN_CLIP,'Walking_A'),{speed:1.1});}
    else{if(en.hitT<=0)setAnim(en,clipName(IDLE_CLIP,CLIPS[0].name));
      if(en.atkCd<=0){en.atkCd=1.3;setAnim(en,clipName(ATK_CLIP,'Interact'),{once:true,speed:1.3,force:true});setTimeout(()=>{if(en.alive&&player.alive){tmp2.subVectors(player.model.position,en.model.position);tmp2.y=0;if(tmp2.length()<2.0)hurtPlayer(en.dmg);}},220);}}
    // hit flash
    en.model.traverse(o=>{if(o.isMesh&&o.material&&o.material.emissive){o.material.emissiveIntensity=en.hitT>0?1.6:0.5;}});
  }
  // health bars
  for(const en of enemies){if(!en.bar)continue;if(!en.alive){en.bar.visible=false;continue;}
    en.bar.position.set(en.model.position.x,2.45,en.model.position.z);const r=Math.max(0,en.hp/en.maxhp);
    en.bar.userData.fg.scale.x=1.0*r;en.bar.userData.fg.position.x=-(1-r)*0.5;}

  // camera follow
  const tgt=player?player.model.position:new THREE.Vector3();
  const cx=tgt.x+camDist*Math.sin(camPitch)*Math.sin(camYaw),cy=tgt.y+1.0+camDist*Math.cos(camPitch),cz=tgt.z+camDist*Math.sin(camPitch)*Math.cos(camYaw);
  camera.position.lerp(tmp.set(cx,cy,cz),0.12);camera.lookAt(tgt.x,tgt.y+1.1,tgt.z);

  // wave-clear check
  if(state==='fight'&&pendingSpawn===0&&aliveCount===0&&player&&player.alive){state='intermission';nextAfterClear();}
  if(state==='fight')updateHUD();
}
function tick(){requestAnimationFrame(tick);const dt=Math.min(0.05,clock.getDelta());try{update(dt);}catch(err){showErr('loop: '+(err&&err.message||err));throw err;}renderer.render(scene,camera);}

// boot: load shared clips, then show character select
CHAMP.loadClips(loader,EMB,clips=>{
  CLIPS=clips;
  if(!CLIPS.length){showErr('no animation clips loaded');return;}
  loadEl.style.opacity=0;setTimeout(()=>loadEl.style.display='none',500);
  showSelect();tick();
});
})();
</script>
